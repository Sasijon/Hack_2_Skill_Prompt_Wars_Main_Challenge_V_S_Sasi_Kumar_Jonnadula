name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Backend: Python tests ──────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        # Inject stub env vars — same as conftest.py does locally.
        # Real Supabase/Gemini credentials are NOT needed for unit/auth tests.
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
          SUPABASE_JWT_SECRET: test-jwt-secret-32bytes-padded-xx
          GEMINI_API_KEY: test-gemini-key
          APP_ENV: test
          CORS_ORIGINS: http://localhost:8081
        run: pytest tests/ -v --tb=short

  # ── Frontend: TypeScript type-check ───────────────────────────────────────
  frontend-typecheck:
    name: Frontend Type Check (tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

  # ── Summary gate ──────────────────────────────────────────────────────────
  ci-passed:
    name: All CI checks passed
    needs: [backend-tests, frontend-typecheck]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.backend-tests.result }}" != "success" || "${{ needs.frontend-typecheck.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI checks passed."
